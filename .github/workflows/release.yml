name: Build & Release

# Build the Windows .exe and publish it as a GitHub Release.
# Triggered by pushing a version tag (e.g. v1.0.0), or manually.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        default: "v0.0.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build .exe (PyInstaller)
        # No Chromium is bundled — the app uses the user's installed browser
        # (Playwright Chromium if present, otherwise Edge/Chrome).
        run: >
          pyinstaller --noconfirm --onefile --windowed
          --name MideaPortaSplitMonitor
          --add-data "config.json;."
          --collect-all playwright
          main.py

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          body: |
            Midea PortaSplit Preis-Monitor — Windows-App.

            **Download `MideaPortaSplitMonitor.exe`** unten und doppelklicken.
            Läuft auf jedem Windows-PC; für JS-Shops wird ein installierter
            Browser genutzt (Edge ist überall vorhanden) — kein Extra-Download.
          files: dist/MideaPortaSplitMonitor.exe
